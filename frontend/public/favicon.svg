<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background with smooth corners -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Document shape -->
  <g filter="url(#shadow)">
    <path d="M160 110H310L360 160V402H160V110Z" fill="white" />
    <path d="M310 110V160H360L310 110Z" fill="#E5E7EB" />
    
    <!-- Lines in document -->
    <rect x="190" y="220" width="130" height="16" rx="8" fill="#3B82F6" opacity="0.8" />
    <rect x="190" y="260" width="130" height="16" rx="8" fill="#3B82F6" opacity="0.6" />
    <rect x="190" y="300" width="80" height="16" rx="8" fill="#3B82F6" opacity="0.4" />
    
    <!-- Currency/Success mark -->
    <circle cx="320" cy="360" r="45" fill="#10B981" />
    <path d="M300 360L315 375L345 345" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
